<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">


  <link rel="stylesheet" href="style.css">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Bento grid</title>

</head>

<body>

  <div class="container  p-4"> <!-- parent container  -->
    <div class="row  g-3"> <!--  main outer parent row  -->

      <!-- Left Column -->
      <div class="col-lg-3">
        <div class="leftColumnItem1  card  p-3  border-0  text-center  mb-3">
          <h2 class="fw-bold  text-start">Create and schedule content <span class="quickerText">quicker.</span></h2>
          <img class="createPostIcon  w-75  mx-auto  d-block" src="assets/images/illustration-create-post.webp" alt="">
        </div>
        <div class="leftColumnItem2  card  p-3  border-0  text-center">
          <h2 class="fw-bold  text-start">Write your content using AI</h2>
          <img class="aiContentIcon  w-75  mx-auto  d-block" src="assets/images/illustration-ai-content.webp" alt="">
        </div>
      </div>


      <!-- Middle column -->
      <div class="col-lg-6">
        <div class="row g-3">
          <div class="col-12">
            <div class="middleColumnItem1  card  p-3  border-0  text-center">
              <h2 class="fw-bold  text-white">Social Media <span class="tenXText">10x</span> Faster with AI </h2>
              <img class="createPostIcon  w-75  mx-auto  d-block" src="assets/images/illustration-five-stars.webp" alt="">
              <p class="text-white-50">Over 4,000 5-star reviews</p>
            </div>
          </div>
        </div>
      </div>






      <div class="col-lg-3">Right_Column</div>

    </div>
  </div>




</body>

</html>
